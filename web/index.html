<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pidgn — Family messages, delivered to your fridge.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.25rem;
      color: #555;
      margin-bottom: 2rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #666;
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      background: #1a1a1a;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .cta:hover { background: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pidgn</h1>
    <p class="tagline">Family messages, delivered to your fridge.</p>
    <p>Send a message. Your family gets a notification. But they can only read it by walking to the fridge and tapping the magnet with their phone.</p>
    <a class="cta" href="#">Download on the App Store</a>
  </div>
</body>
</html>
