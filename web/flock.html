<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect on Pidgn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #12100D;
            color: #FDF5ED;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 380px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: rgba(198, 134, 103, 0.12);
            border: 1px solid rgba(198, 134, 103, 0.2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 15px;
            color: rgba(253, 245, 237, 0.4);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .cta {
            display: inline-block;
            background: #C68667;
            color: #12100D;
            font-size: 17px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 14px;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .note {
            font-size: 13px;
            color: rgba(253, 245, 237, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🐦</div>
        <h1>Connect on Pidgn</h1>
        <p class="subtitle">Someone wants to add your households to each other's flock — open this link on your iPhone with Pidgn installed.</p>
        <a href="https://apps.apple.com/app/pidgn" class="cta">Get Pidgn</a>
        <p class="note">Letters carried with care.</p>
    </div>
</body>
</html>
